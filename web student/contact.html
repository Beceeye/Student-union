<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Contact EAU STUDENT GALKAIO — student union office." />
    <meta name="theme-color" content="#0b3d91" />
    <title>Contact — EAU STUDENT GALKAIO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&family=Fraunces:ital,opsz,wght@0,9..144,500..700;1,9..144,500..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="contact">
    <a class="skip-link" href="#main">Skip to content</a>
    <div data-include="header"></div>

    <main id="main">
      <div class="page-hero">
        <div class="container">
          <h1 data-i18n="contact.page.title"></h1>
          <p data-i18n="contact.page.sub"></p>
        </div>
      </div>

      <section class="section">
        <div class="container contact-grid">
          <div class="contact-info-block reveal">
            <h2 style="margin-top: 0; font-family: var(--font-display)">EAU STUDENT GALKAIO</h2>
            <p data-i18n="contact.addr"></p>
            <p style="margin: 1.25rem 0 0">
              <strong>Phone:</strong> <a href="tel:+252000000000">+252 000 000 000</a><br />
              <strong>Email:</strong> <a href="mailto:union@eau.edu.example">union@eau.edu.example</a>
            </p>
            <p style="margin: 1rem 0 0; font-size: 0.92rem; opacity: 0.9">Office hours: Sun–Thu, 9:00–15:00</p>
            <div class="social-row">
              <a href="#" rel="noopener noreferrer">Facebook</a>
              <a href="#" rel="noopener noreferrer">Instagram</a>
              <a href="#" rel="noopener noreferrer">YouTube</a>
              <a href="#" rel="noopener noreferrer">X</a>
            </div>
          </div>
          <div class="form-card reveal">
            <h2 style="margin-top: 0; font-family: var(--font-display)">Write to the union</h2>
            <form data-demo-form>
              <div class="form-group">
                <label for="c-name">Full name</label>
                <input id="c-name" name="name" type="text" autocomplete="name" required />
              </div>
              <div class="form-group">
                <label for="c-email">Email</label>
                <input id="c-email" name="email" type="email" autocomplete="email" required />
              </div>
              <div class="form-group">
                <label for="c-faculty">Faculty</label>
                <select id="c-faculty" name="faculty">
                  <option>IT</option>
                  <option>BBA</option>
                  <option>Social Science</option>
                  <option>Sharia &amp; Law</option>
                  <option>Health Science</option>
                  <option>Medicine</option>
                  <option>Civil Engineering</option>
                </select>
              </div>
              <div class="form-group">
                <label for="c-msg">Message</label>
                <textarea id="c-msg" name="message" required></textarea>
              </div>
              <button type="submit" class="btn btn-red" data-i18n="contact.form.send"></button>
            </form>
          </div>
        </div>
      </section>

      <section class="section" style="padding-top: 0">
        <div class="container">
          <div class="newsletter reveal">
            <h3 class="section-title" style="margin-bottom: 0.35rem" data-i18n="newsletter.title"></h3>
            <p style="margin: 0; color: var(--muted)" data-i18n="newsletter.sub"></p>
            <form data-demo-form>
              <label class="visually-hidden" for="nl2">Email</label>
              <input id="nl2" type="email" required data-i18n-placeholder="newsletter.placeholder" />
              <button type="submit" class="btn btn-primary" data-i18n="newsletter.btn"></button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div data-include="footer"></div>
    <script src="js/app.js" defer></script>
  </body>
</html>
