            <p class="subtitle" data-i18n="home.hero.sub"></p>
            <div class="hero-cta">

          <div class="card-grid" style="grid-template-columns: repeat(auto-fit, minmax(260px, 1fr))">

                src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=800&q=80"
                alt=""
                width="800"
                height="500"
                loading="lazy"
              />
              <div class="card-body">
                <h3 style="margin: 0 0 0.5rem; font-family: var(--font-display)" data-i18n="home.card1.title"></h3>
                <p style="margin: 0; color: var(--muted)" data-i18n="home.card1.desc"></p>
              </div>
            </article>
            <article class="card reveal">
              <img
                class="card-thumb"
                src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&w=800&q=80"

                <p style="margin: 0; color: var(--muted)" data-i18n="home.card3.desc"></p>
              </div>
            </article>
          </div>
        </div>

            <div class="lead-mini reveal">

              />

            <a class="btn btn-primary" href="about.html" data-i18n="home.lead.link"></a>

            <h2 class="section-title" style="margin-bottom: 1rem" data-i18n="calendar.title"></h2>
            <div class="calendar-head">
              <h3 data-cal-title style="margin: 0"></h3>
              <div class="cal-nav" aria-hidden="true">
                <button type="button" tabindex="-1">‹</button>
                <button type="button" tabindex="-1">›</button>
              </div>
            </div>

          </div>

          <div class="newsletter reveal" style="margin-top: 2rem">
            <h3 class="section-title" style="margin-bottom: 0.35rem" data-i18n="newsletter.title"></h3>
            <p style="margin: 0; color: var(--muted)" data-i18n="newsletter.sub"></p>
            <form data-demo-form>
              <label class="visually-hidden" for="nl-email">Email</label>
              <input id="nl-email" type="email" required data-i18n-placeholder="newsletter.placeholder" />
              <button type="submit" class="btn btn-red" data-i18n="newsletter.btn"></button>
